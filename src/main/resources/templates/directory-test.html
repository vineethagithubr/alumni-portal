<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Alumni Directory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="container mt-5">

<a href="/dashboard" class="btn btn-primary mb-3">
    <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
</a>

<h2>Alumni Directory</h2>

<!-- Search Form -->
<div class="card mb-4">
    <div class="card-body">
        <h5 class="card-title">
            <i class="fas fa-search me-2"></i>Search Alumni
        </h5>
        
        <form th:action="@{/directory}" method="get">
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="name" class="form-label">Search by Name</label>
                    <input type="text" 
                           class="form-control" 
                           id="name" 
                           name="name" 
                           th:value="${searchName}"
                           placeholder="Enter name to search...">
                </div>
                
                <div class="col-md-3 mb-3">
                    <label for="branch" class="form-label">Branch</label>
                    <select class="form-select" id="branch" name="branch">
                        <option value="">All Branches</option>
                        <option value="Computer Science" th:selected="${selectedBranch == 'Computer Science'}">Computer Science</option>
                        <option value="Electronics" th:selected="${selectedBranch == 'Electronics'}">Electronics</option>
                        <option value="Mechanical" th:selected="${selectedBranch == 'Mechanical'}">Mechanical</option>
                        <option value="Civil" th:selected="${selectedBranch == 'Civil'}">Civil</option>
                        <option value="Electrical" th:selected="${selectedBranch == 'Electrical'}">Electrical</option>
                        <option value="Information Technology" th:selected="${selectedBranch == 'Information Technology'}">Information Technology</option>
                    </select>
                </div>
                
                <div class="col-md-3 mb-3">
                    <label for="passoutYear" class="form-label">Passout Year</label>
                    <select class="form-select" id="passoutYear" name="passoutYear">
                        <option value="">All Years</option>
                        <option value="2024" th:selected="${selectedYear == 2024}">2024</option>
                        <option value="2023" th:selected="${selectedYear == 2023}">2023</option>
                        <option value="2022" th:selected="${selectedYear == 2022}">2022</option>
                        <option value="2021" th:selected="${selectedYear == 2021}">2021</option>
                        <option value="2020" th:selected="${selectedYear == 2020}">2020</option>
                        <option value="2019" th:selected="${selectedYear == 2019}">2019</option>
                        <option value="2018" th:selected="${selectedYear == 2018}">2018</option>
                        <option value="2017" th:selected="${selectedYear == 2017}">2017</option>
                        <option value="2016" th:selected="${selectedYear == 2016}">2016</option>
                        <option value="2015" th:selected="${selectedYear == 2015}">2015</option>
                    </select>
                </div>
                
                <div class="col-md-2 mb-3 d-flex align-items-end">
                    <div class="d-flex gap-2 w-100">
                        <button type="submit" class="btn btn-primary flex-fill">
                            <i class="fas fa-search me-2"></i>Search
                        </button>
                        <a href="/directory" class="btn btn-secondary">
                            <i class="fas fa-times"></i>
                        </a>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>

<!-- Results -->
<div class="alert alert-info">
    <i class="fas fa-info-circle me-2"></i>
    Found <span th:text="${#lists.size(users)}">0</span> alumni
</div>

<div th:if="${#lists.isEmpty(users)}" class="alert alert-warning">
    <i class="fas fa-exclamation-triangle me-2"></i>
    No alumni found. Try adjusting your search criteria.
</div>

<div th:if="${!#lists.isEmpty(users)}">
    <div class="row">
        <div th:each="user : ${users}" class="col-md-6 col-lg-4 mb-3">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title" th:text="${user.name}">Name</h5>
                    <p class="card-text">
                        <i class="fas fa-envelope me-2"></i><span th:text="${user.email}">Email</span><br>
                        <i class="fas fa-graduation-cap me-2"></i><span th:text="${user.branch}">Branch</span><br>
                        <i class="fas fa-calendar-alt me-2"></i><span th:text="${user.passoutYear}">Year</span>
                    </p>
                    <div class="d-flex gap-2">
                        <a th:href="@{/chat/{id}(id=${user.id})}" class="btn btn-primary btn-sm flex-fill">
                            <i class="fas fa-comments me-2"></i>Chat
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
