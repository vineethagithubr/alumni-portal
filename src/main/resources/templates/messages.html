<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All Messages - Alumni Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 0 40px;
            position: relative;
        }
        .page-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="80" cy="40" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="50" cy="70" r="2" fill="rgba(255,255,255,0.1)"/></svg>');
            background-size: 100px 100px;
            animation: float 20s linear infinite;
        }
        .header-content {
            position: relative;
            z-index: 2;
        }
        .page-title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .page-subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        .content-section {
            padding: 40px 0;
        }
        .message-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            padding: 25px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }
        .message-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .message-author {
            font-weight: bold;
            color: #333;
            font-size: 1.1rem;
        }
        .message-date {
            color: #666;
            font-size: 0.9rem;
        }
        .message-content {
            color: #555;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .action-buttons {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }
        .fab-button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-size: 1.5rem;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
            transition: all 0.3s ease;
        }
        .fab-button:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
        }
        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            color: white;
        }
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #999;
        }
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        .empty-state h3 {
            color: #666;
            margin-bottom: 10px;
        }
        @keyframes float {
            0% { transform: translateX(0); }
            100% { transform: translateX(100px); }
        }
    </style>
</head>

<body>

<div class="page-header">
    <a href="/dashboard" class="back-button">
        <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
    </a>
    
    <div class="container">
        <div class="header-content text-center">
            <h1 class="page-title">All Messages</h1>
            <p class="page-subtitle">Connect with your alumni community</p>
        </div>
    </div>
</div>

<div class="content-section">
    <div class="container">
        
        <div th:if="${#lists.isEmpty(messages)}" class="empty-state">
            <i class="fas fa-inbox"></i>
            <h3>No Messages Yet</h3>
            <p>Be the first to start a conversation with the alumni community!</p>
            <a href="/messages/new" class="btn btn-primary">
                <i class="fas fa-plus me-2"></i>Post First Message
            </a>
        </div>

        <div th:each="message : ${messages}" class="message-card">
            <div class="message-header">
                <div class="message-author">
                    <i class="fas fa-user-circle me-2"></i>
                    <span th:text="${message.name}">Author Name</span>
                </div>
                <div class="message-date">
                    <i class="fas fa-clock me-1"></i>
                    <span th:if="${message.publishedDate}" th:text="${#temporals.format(message.publishedDate, 'MMM dd, yyyy HH:mm')}">Recently posted</span>
                    <span th:unless="${message.publishedDate}">Recently posted</span>
                </div>
            </div>
            <div class="message-content" th:text="${message.content}">
                Message content goes here...
            </div>
        </div>

    </div>
</div>

<!-- Floating Action Button -->
<div class="action-buttons">
    <a href="/messages/new" class="fab-button" title="Post New Message">
        <i class="fas fa-plus"></i>
    </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
