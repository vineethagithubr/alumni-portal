<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/alumsphere-branding.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .admin-header {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
            padding: 40px 0;
            position: relative;
            overflow: hidden;
        }
        .admin-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }
        .admin-subtitle {
            font-size: 1.2rem;
            opacity: 0.95;
            font-weight: 300;
        }
        .users-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin: 30px 0;
        }
        .user-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 4px solid #dc3545;
            transition: all 0.3s ease;
        }
        .user-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }
        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .user-info {
            flex: 1;
        }
        .user-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .user-email {
            color: #666;
            font-size: 0.9rem;
        }
        .user-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #555;
            font-size: 0.9rem;
        }
        .role-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .role-admin {
            background: #dc3545;
            color: white;
        }
        .role-user {
            background: #28a745;
            color: white;
        }
        .user-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .btn-delete {
            background: #dc3545;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-delete:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.3);
        }
        .role-form {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .role-select {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 0.9rem;
        }
        .btn-update {
            background: #667eea;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-update:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        .back-btn {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            border: 2px solid #495057;
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .back-btn:hover {
            background: linear-gradient(135deg, #5a6268 0%, #343a40 100%);
            transform: translateY(-2px);
            color: white;
            border-color: #343a40;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-item {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .alert {
            border-radius: 15px;
            border: none;
        }
        .alert-success {
            background: rgba(40, 167, 69, 0.1);
            color: #28a745;
        }
        .alert-danger {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .admin-header {
                padding: 30px 0;
            }
            .admin-title {
                font-size: 2rem;
            }
            .users-container {
                padding: 20px;
            }
            .user-card {
                padding: 20px;
            }
            .user-actions {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>

<body>

<!-- Alumsphere Brand Header -->
<div class="alumsphere-brand-header">
    <strong>ALUMSPHERE</strong> - Admin Panel
</div>

<!-- Admin Header -->
<div class="admin-header">
    <div class="container">
        <div class="text-center">
            <i class="fas fa-users-cog mb-3" style="font-size: 4rem; opacity: 0.8;"></i>
            <h1 class="admin-title">User Management</h1>
            <p class="admin-subtitle">Manage user accounts and roles</p>
        </div>
    </div>
</div>

<!-- Content Section -->
<div class="container" style="padding: 40px 0;">
    
    <!-- Flash Messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-check-circle me-2"></i>
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-exclamation-circle me-2"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Back to Admin Dashboard -->
    <div class="d-flex gap-2 mb-3">
        <a href="/dashboard" class="back-btn" style="background: rgba(255, 255, 255, 0.15);">
            <i class="fas fa-home me-2"></i>Back to Dashboard
        </a>
        <a href="/admin/dashboard" class="back-btn">
            <i class="fas fa-arrow-left me-2"></i>Back to Admin Dashboard
        </a>
    </div>

    <div class="users-container">
        
        <!-- Statistics Bar -->
        <div class="stats-bar">
            <div class="stat-item">
                <i class="fas fa-users"></i>
                <div>
                    <div class="stat-number" th:text="${#lists.size(users)}">0</div>
                    <div class="stat-label">Total Users</div>
                </div>
            </div>
            
            <div class="stat-item">
                <i class="fas fa-user-shield"></i>
                <div>
                    <div class="stat-number" th:text="${#lists.size(users.?[role == T(com.alumni.alumni_portal.model.User.Role).ADMIN])}">0</div>
                    <div class="stat-label">Admins</div>
                </div>
            </div>
            
            <div class="stat-item">
                <i class="fas fa-user"></i>
                <div>
                    <div class="stat-number" th:text="${#lists.size(users.?[role == T(com.alumni.alumni_portal.model.User.Role).USER])}">0</div>
                    <div class="stat-label">Regular Users</div>
                </div>
            </div>
        </div>

        <!-- Add User Button -->
        <div class="text-center mb-4">
            <a href="/admin/users/add" class="btn btn-primary">
                <i class="fas fa-user-plus me-2"></i>Add New User
            </a>
        </div>

        <!-- Users List -->
        <div th:if="${#lists.isEmpty(users)}" class="text-center" style="padding: 60px 20px; color: #999;">
            <i class="fas fa-users" style="font-size: 4rem; margin-bottom: 20px; opacity: 0.5;"></i>
            <h3>No Users Found</h3>
            <p>No users have registered yet.</p>
        </div>

        <div th:if="${!#lists.isEmpty(users)}">
            <div th:each="user : ${users}" class="user-card">
                <div class="user-header">
                    <div class="user-info">
                        <div class="user-name">
                            <i class="fas fa-user me-2"></i>
                            <span th:text="${user.name}">User Name</span>
                            <span class="role-badge ms-2" th:class="${user.role == T(com.alumni.alumni_portal.model.User.Role).ADMIN ? 'role-admin' : 'role-user'}" th:text="${user.role}">USER</span>
                        </div>
                        <div class="user-email">
                            <i class="fas fa-envelope me-2"></i>
                            <span th:text="${user.email}">email@example.com</span>
                        </div>
                    </div>
                    
                    <div class="user-actions">
                        <form th:action="@{/admin/users/role/{id}(id=${user.id})}" method="post" class="role-form">
                            <select name="role" class="role-select">
                                <option value="USER" th:selected="${user.role == T(com.alumni.alumni_portal.model.User.Role).USER}">USER</option>
                                <option value="ADMIN" th:selected="${user.role == T(com.alumni.alumni_portal.model.User.Role).ADMIN}">ADMIN</option>
                            </select>
                            <button type="submit" class="btn-update">Update</button>
                        </form>
                        
                        <form th:action="@{/admin/users/delete/{id}(id=${user.id})}" method="post" onsubmit="return confirm('Are you sure you want to delete this user? This action cannot be undone.')">
                            <button type="submit" class="btn-delete">
                                <i class="fas fa-trash me-2"></i>Delete
                            </button>
                        </form>
                    </div>
                </div>
                
                <div class="user-details">
                    <div class="detail-item">
                        <i class="fas fa-graduation-cap"></i>
                        <span th:text="${user.branch}">Branch</span>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-calendar"></i>
                        <span th:text="'Passout: ' + ${user.passoutYear}">Passout Year</span>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-id-badge"></i>
                        <span th:text="'ID: ' + ${user.id}">User ID</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
