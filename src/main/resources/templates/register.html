<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Alumni Portal - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .register-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 500px;
            margin: 80px auto;
        }
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-section i {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 10px;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-register {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            transition: transform 0.3s ease;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(40, 167, 69, 0.3);
        }
        .form-row {
            display: flex;
            gap: 15px;
        }
        .form-row .form-group {
            flex: 1;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .form-label i {
            color: #667eea;
            margin-right: 8px;
        }
        .password-strength {
            height: 5px;
            border-radius: 3px;
            margin-top: 5px;
            background: #e9ecef;
            transition: all 0.3s ease;
        }
    </style>
</head>

<body>

<div class="register-container">
    <div class="logo-section">
        <i class="fas fa-user-graduate"></i>
        <h3 class="mb-0">Join Alumni Portal</h3>
        <p class="text-muted">Create your account and connect with fellow alumni</p>
    </div>

    <form th:action="@{/register}" th:object="${user}" method="post">
        <div class="mb-3">
            <label for="name" class="form-label">
                <i class="fas fa-user"></i>Full Name
            </label>
            <input type="text" id="name" th:field="*{name}" class="form-control" placeholder="Enter your full name" required/>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">
                <i class="fas fa-envelope"></i>Email Address
            </label>
            <input type="email" id="email" th:field="*{email}" class="form-control" placeholder="Enter your email address" required/>
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">
                <i class="fas fa-lock"></i>Password
            </label>
            <input type="password" id="password" th:field="*{password}" class="form-control" placeholder="Create a strong password" required/>
            <div class="password-strength"></div>
        </div>

        <div class="form-row mb-3">
            <div class="form-group">
                <label for="branch" class="form-label">
                    <i class="fas fa-book"></i>Branch
                </label>
                <input type="text" id="branch" th:field="*{branch}" class="form-control" placeholder="e.g., Computer Science" required/>
            </div>
            <div class="form-group">
                <label for="passoutYear" class="form-label">
                    <i class="fas fa-calendar-alt"></i>Passout Year
                </label>
                <input type="number" id="passoutYear" th:field="*{passoutYear}" class="form-control" placeholder="e.g., 2020" min="1950" max="2030" required/>
            </div>
        </div>

        <div class="mb-3">
            <div class="form-check">
                <input type="checkbox" class="form-check-input" id="terms" required>
                <label class="form-check-label" for="terms">
                    I agree to the <a href="#" class="text-primary">Terms and Conditions</a> and <a href="#" class="text-primary">Privacy Policy</a>
                </label>
            </div>
        </div>

        <button type="submit" class="btn btn-success btn-register w-100">
            <i class="fas fa-user-plus me-2"></i>Create Account
        </button>
    </form>

    <div class="login-link">
        Already have an account? <a href="/login">Login here</a>
    </div>
</div>

<script>
// Password strength indicator
document.getElementById('password').addEventListener('input', function() {
    const password = this.value;
    const strengthBar = document.querySelector('.password-strength');
    let strength = 0;
    
    if (password.length >= 8) strength++;
    if (password.match(/[a-z]+/)) strength++;
    if (password.match(/[A-Z]+/)) strength++;
    if (password.match(/[0-9]+/)) strength++;
    if (password.match(/[$@#&!]+/)) strength++;
    
    const colors = ['#dc3545', '#ffc107', '#28a745', '#28a745', '#28a745'];
    const widths = ['20%', '40%', '60%', '80%', '100%'];
    
    strengthBar.style.background = colors[strength - 1] || '#e9ecef';
    strengthBar.style.width = widths[strength - 1] || '0%';
});
</script>

</body>
</html>
