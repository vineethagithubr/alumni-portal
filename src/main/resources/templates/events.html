<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Events - Alumni Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .page-header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 60px 0 40px;
            position: relative;
        }
        .page-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="80" cy="40" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="50" cy="70" r="2" fill="rgba(255,255,255,0.1)"/></svg>');
            background-size: 100px 100px;
            animation: float 20s linear infinite;
        }
        .header-content {
            position: relative;
            z-index: 2;
        }
        .page-title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .page-subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        .content-section {
            padding: 40px 0;
        }
        .event-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            padding: 25px;
            margin-bottom: 20px;
            border-left: 4px solid #f5576c;
            transition: all 0.3s ease;
        }
        .event-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }
        .event-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .event-title {
            font-weight: bold;
            color: #333;
            font-size: 1.3rem;
            margin-bottom: 5px;
        }
        .event-meta {
            color: #666;
            font-size: 0.9rem;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }
        .event-meta-item {
            display: flex;
            align-items: center;
        }
        .event-description {
            color: #555;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .published-date {
            color: #999;
            font-size: 0.85rem;
            font-style: italic;
        }
        .action-buttons {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }
        .fab-button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            color: white;
            font-size: 1.5rem;
            box-shadow: 0 10px 25px rgba(245, 87, 108, 0.3);
            transition: all 0.3s ease;
        }
        .fab-button:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 35px rgba(245, 87, 108, 0.4);
        }
        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            color: white;
        }
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #999;
        }
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        .empty-state h3 {
            color: #666;
            margin-bottom: 10px;
        }
        @keyframes float {
            0% { transform: translateX(0); }
            100% { transform: translateX(100px); }
        }
    </style>
</head>

<body>

<div class="page-header">
    <a href="/dashboard" class="back-button">
        <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
    </a>
    
    <div class="container">
        <div class="header-content text-center">
            <h1 class="page-title">All Events</h1>
            <p class="page-subtitle">Stay updated with alumni gatherings and activities</p>
        </div>
    </div>
</div>

<div class="content-section">
    <div class="container">
        
        <!-- Flash Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <div th:if="${#lists.isEmpty(events)}" class="empty-state">
            <i class="fas fa-calendar-times"></i>
            <h3>No Events Yet</h3>
            <p>Be the first to organize an event for the alumni community!</p>
            <a href="/events/new" class="btn btn-warning">
                <i class="fas fa-plus me-2"></i>Create First Event
            </a>
        </div>

        <div th:each="event : ${events}" class="event-card">
            <div class="event-header">
                <div>
                    <h3 class="event-title" th:text="${event.name}">Event Name</h3>
                </div>
                <div th:if="${isAdmin}" class="event-actions">
                    <form th:action="@{/events/delete/{id}(id=${event.id})}" method="post" onsubmit="return confirm('Are you sure you want to delete this event? This action cannot be undone.')" style="display: inline;">
                        <button type="submit" class="btn btn-sm btn-outline-danger" title="Delete Event">
                            <i class="fas fa-trash"></i>
                        </button>
                    </form>
                </div>
            </div>
            
            <div class="event-meta">
                <div class="event-meta-item">
                    <i class="fas fa-calendar me-2"></i>
                    <span th:text="${event.date}">Event Date</span>
                </div>
                <div class="event-meta-item">
                    <i class="fas fa-map-marker-alt me-2"></i>
                    <span th:text="${event.location}">Location</span>
                </div>
            </div>
            
            <div class="event-description" th:text="${event.description}">
                Event description goes here...
            </div>
            
            <div class="published-date">
                <i class="fas fa-calendar-plus me-1"></i>
                <span th:if="${event.publishedDate}" th:text="${#temporals.format(event.publishedDate, 'MMM dd, yyyy HH:mm')}">Recently published</span>
                <span th:unless="${event.publishedDate}">Recently published</span>
            </div>
        </div>

    </div>
</div>

<!-- Floating Action Button -->
<div class="action-buttons">
    <a href="/events/new" class="fab-button" title="Create New Event">
        <i class="fas fa-plus"></i>
    </a>
</div>

<style>
/* Mobile Responsive Styles */
@media (max-width: 768px) {
    .page-header {
        padding: 40px 0 30px;
    }
    
    .events-container {
        padding: 20px 15px;
    }
    
    .event-card {
        margin-bottom: 20px;
        padding: 20px;
    }
    
    .event-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
    }
    
    .event-meta {
        flex-direction: column;
        gap: 5px;
    }
    
    .fab-button {
        width: 50px;
        height: 50px;
        bottom: 20px;
        right: 20px;
    }
}

@media (max-width: 480px) {
    .page-header {
        padding: 30px 0 20px;
    }
    
    .events-container {
        padding: 15px 10px;
    }
    
    .event-card {
        padding: 15px;
    }
    
    .event-title {
        font-size: 1.1rem;
    }
    
    .event-description {
        font-size: 0.9rem;
    }
}
</style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
