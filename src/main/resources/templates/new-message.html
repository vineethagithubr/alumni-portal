<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Post Message - Alumni Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .form-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 600px;
            margin: 80px auto;
        }
        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .form-header i {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 15px;
        }
        .form-title {
            font-size: 2rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .form-subtitle {
            color: #666;
            font-size: 1rem;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .form-label i {
            color: #667eea;
            margin-right: 8px;
        }
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s ease;
            color: white;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .btn-cancel {
            background: #6c757d;
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s ease;
            color: white;
        }
        .btn-cancel:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(108, 117, 125, 0.3);
        }
        .character-count {
            font-size: 0.85rem;
            color: #666;
            text-align: right;
            margin-top: 5px;
        }
    </style>
</head>

<body>

<div class="form-container">
    <a href="/dashboard" class="btn btn-cancel position-fixed" style="top: 20px; left: 20px;">
        <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
    </a>
    
    <div class="form-header">
        <i class="fas fa-comments"></i>
        <h2 class="form-title">Post a Message</h2>
        <p class="form-subtitle">Share your thoughts with the alumni community</p>
    </div>

    <form th:action="@{/messages/new}" th:object="${message}" method="post">
        <div class="mb-4">
            <label for="content" class="form-label">
                <i class="fas fa-message"></i>Your Message
            </label>
            <textarea 
                class="form-control" 
                id="content" 
                th:field="*{content}" 
                rows="6" 
                placeholder="Share your thoughts, announcements, or questions with the alumni community..."
                maxlength="1000"
                required
                oninput="updateCharCount()"></textarea>
            <div class="character-count">
                <span id="charCount">0</span>/1000 characters
            </div>
        </div>

        <div class="d-flex gap-3">
            <button type="submit" class="btn btn-submit">
                <i class="fas fa-paper-plane me-2"></i>Post Message
            </button>
            <a href="/dashboard" class="btn btn-cancel">
                <i class="fas fa-times me-2"></i>Cancel
            </a>
        </div>
    </form>
</div>

<script>
function updateCharCount() {
    const textarea = document.getElementById('content');
    const charCount = document.getElementById('charCount');
    charCount.textContent = textarea.value.length;
    
    if (textarea.value.length > 900) {
        charCount.style.color = '#dc3545';
    } else if (textarea.value.length > 700) {
        charCount.style.color = '#ffc107';
    } else {
        charCount.style.color = '#666';
    }
}

// Auto-resize textarea
document.getElementById('content').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = this.scrollHeight + 'px';
});
</script>

</body>
</html>
