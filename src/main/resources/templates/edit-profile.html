<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Profile - Alumni Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .main-container {
            max-width: 800px;
            margin: 80px auto;
            padding: 0 20px;
        }
        .page-header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .page-title {
            color: #2c3e50;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .page-subtitle {
            color: #7f8c8d;
            font-size: 1.1rem;
        }
        .profile-form {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        .form-section {
            margin-bottom: 30px;
        }
        .section-title {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        .form-label {
            font-weight: 500;
            color: #555;
            margin-bottom: 8px;
        }
        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }
        .btn-secondary {
            background: #6c757d;
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }
        .alert {
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 20px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            color: white;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .back-link:hover {
            color: white;
            transform: translateX(-5px);
        }
        .form-row {
            display: flex;
            gap: 20px;
        }
        .form-col {
            flex: 1;
        }
    </style>
</head>

<body>

<div class="main-container">
    <a href="/profile" class="back-link">
        <i class="fas fa-arrow-left me-2"></i>Back to Profile
    </a>

    <div class="page-header">
        <h1 class="page-title">
            <i class="fas fa-user-edit me-3"></i>Edit Profile
        </h1>
        <p class="page-subtitle">Update your personal information</p>
    </div>

    <div class="profile-form">
        <!-- Success/Error Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${success}">Success message</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${error}">Error message</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <form th:action="@{/profile/update}" method="post">
            
            <!-- Personal Information -->
            <div class="form-section">
                <h5 class="section-title">
                    <i class="fas fa-user me-2"></i>Personal Information
                </h5>
                
                <div class="mb-3">
                    <label for="name" class="form-label">Full Name *</label>
                    <input type="text" class="form-control" id="name" name="name" 
                           th:value="${user.name}" required>
                </div>
                
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address *</label>
                    <input type="email" class="form-control" id="email" name="email" 
                           th:value="${user.email}" required>
                </div>
            </div>

            <!-- Academic Information -->
            <div class="form-section">
                <h5 class="section-title">
                    <i class="fas fa-graduation-cap me-2"></i>Academic Information
                </h5>
                
                <div class="form-row">
                    <div class="form-col">
                        <div class="mb-3">
                            <label for="branch" class="form-label">Branch *</label>
                            <select class="form-control" id="branch" name="branch" required>
                                <option value="">Select Branch</option>
                                <option value="Computer Science" th:selected="${user.branch == 'Computer Science'}">Computer Science</option>
                                <option value="Information Technology" th:selected="${user.branch == 'Information Technology'}">Information Technology</option>
                                <option value="Electronics & Communication" th:selected="${user.branch == 'Electronics & Communication'}">Electronics & Communication</option>
                                <option value="Electrical Engineering" th:selected="${user.branch == 'Electrical Engineering'}">Electrical Engineering</option>
                                <option value="Mechanical Engineering" th:selected="${user.branch == 'Mechanical Engineering'}">Mechanical Engineering</option>
                                <option value="Civil Engineering" th:selected="${user.branch == 'Civil Engineering'}">Civil Engineering</option>
                                <option value="Chemical Engineering" th:selected="${user.branch == 'Chemical Engineering'}">Chemical Engineering</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-col">
                        <div class="mb-3">
                            <label for="passoutYear" class="form-label">Passout Year *</label>
                            <input type="number" class="form-control" id="passoutYear" name="passoutYear" 
                                   th:value="${user.passoutYear}" min="1950" max="2030" required>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="d-flex justify-content-between">
                <a href="/profile" class="btn btn-secondary">
                    <i class="fas fa-times me-2"></i>Cancel
                </a>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-2"></i>Save Changes
                </button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
