<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Management - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/alumsphere-branding.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .admin-header {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
            padding: 40px 0;
            position: relative;
            overflow: hidden;
        }
        .admin-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }
        .admin-subtitle {
            font-size: 1.2rem;
            opacity: 0.95;
            font-weight: 300;
        }
        .events-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin: 30px 0;
        }
        .event-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 4px solid #dc3545;
            transition: all 0.3s ease;
        }
        .event-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }
        .event-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .event-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .event-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 15px;
        }
        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #555;
            font-size: 0.9rem;
        }
        .event-description {
            color: #555;
            line-height: 1.6;
            margin-bottom: 20px;
            padding: 15px;
            background: white;
            border-radius: 10px;
            border: 1px solid #e9ecef;
        }
        .event-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
        }
        .btn-delete {
            background: #dc3545;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-delete:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.3);
        }
        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            color: white;
        }
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-item {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .alert {
            border-radius: 15px;
            border: none;
        }
        .alert-success {
            background: rgba(40, 167, 69, 0.1);
            color: #28a745;
        }
        .alert-danger {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
        }
        .published-date {
            color: #666;
            font-size: 0.8rem;
            font-style: italic;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .admin-header {
                padding: 30px 0;
            }
            .admin-title {
                font-size: 2rem;
            }
            .events-container {
                padding: 20px;
            }
            .event-card {
                padding: 20px;
            }
            .event-actions {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>

<body>

<!-- Alumsphere Brand Header -->
<div class="alumsphere-brand-header">
    <strong>ALUMSPHERE</strong> - Admin Panel
</div>

<!-- Admin Header -->
<div class="admin-header">
    <div class="container">
        <div class="text-center">
            <i class="fas fa-calendar-alt mb-3" style="font-size: 4rem; opacity: 0.8;"></i>
            <h1 class="admin-title">Event Management</h1>
            <p class="admin-subtitle">Manage alumni events and gatherings</p>
        </div>
    </div>
</div>

<!-- Content Section -->
<div class="container" style="padding: 40px 0;">
    
    <!-- Flash Messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-check-circle me-2"></i>
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-exclamation-circle me-2"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Back to Admin Dashboard -->
    <a href="/admin/dashboard" class="back-btn">
        <i class="fas fa-arrow-left me-2"></i>Back to Admin Dashboard
    </a>

    <div class="events-container">
        
        <!-- Statistics Bar -->
        <div class="stats-bar">
            <div class="stat-item">
                <i class="fas fa-calendar"></i>
                <div>
                    <div class="stat-number" th:text="${#lists.size(events)}">0</div>
                    <div class="stat-label">Total Events</div>
                </div>
            </div>
            
            <div class="stat-item">
                <i class="fas fa-clock"></i>
                <div>
                    <div class="stat-number" th:text="${#lists.size(events.?[publishedDate != null])}">0</div>
                    <div class="stat-label">Published</div>
                </div>
            </div>
        </div>

        <!-- Events List -->
        <div th:if="${#lists.isEmpty(events)}" class="text-center" style="padding: 60px 20px; color: #999;">
            <i class="fas fa-calendar-times" style="font-size: 4rem; margin-bottom: 20px; opacity: 0.5;"></i>
            <h3>No Events Found</h3>
            <p>No events have been created yet.</p>
            <a href="/events/new" class="btn btn-primary">
                <i class="fas fa-plus me-2"></i>Create First Event
            </a>
        </div>

        <div th:if="${!#lists.isEmpty(events)}">
            <div th:each="event : ${events}" class="event-card">
                <div class="event-header">
                    <div>
                        <div class="event-title">
                            <i class="fas fa-calendar-alt me-2"></i>
                            <span th:text="${event.name}">Event Name</span>
                        </div>
                        <div class="published-date" th:if="${event.publishedDate}">
                            Published: <span th:text="${#temporals.format(event.publishedDate, 'MMM dd, yyyy')}">Date</span>
                        </div>
                    </div>
                    
                    <div class="event-actions">
                        <form th:action="@{/admin/events/delete/{id}(id=${event.id})}" method="post" onsubmit="return confirm('Are you sure you want to delete this event? This action cannot be undone.')">
                            <button type="submit" class="btn-delete">
                                <i class="fas fa-trash me-2"></i>Delete Event
                            </button>
                        </form>
                    </div>
                </div>
                
                <div class="event-meta">
                    <div class="meta-item">
                        <i class="fas fa-calendar-day"></i>
                        <span th:text="${event.date}">Event Date</span>
                    </div>
                    <div class="meta-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <span th:text="${event.location}">Location</span>
                    </div>
                </div>
                
                <div class="event-description" th:if="${event.description}">
                    <span th:text="${event.description}">Event description goes here...</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
