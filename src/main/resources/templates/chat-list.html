<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Profile Style Chat List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .chat-profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .chat-profile-item {
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            padding: 15px 10px;
            border-radius: 15px;
        }
        .chat-profile-item:hover {
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f4ff 100%);
            transform: translateY(-3px);
            text-decoration: none;
            color: inherit;
        }
        .profile-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            margin: 0 auto 10px;
            font-size: 1.3rem;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            position: relative;
        }
        .profile-name {
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.9rem;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .profile-status {
            color: #7f8c8d;
            font-size: 0.75rem;
        }
        .message-indicator {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #28a745;
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(40, 167, 69, 0.4);
        }
        .empty-profiles {
            text-align: center;
            padding: 50px 20px;
            color: #95a5a6;
        }
        .empty-profiles i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.4;
        }
        .empty-profiles p {
            margin: 0;
            font-size: 0.95rem;
        }
        .view-all-link {
            display: block;
            text-align: center;
            padding: 18px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            border-top: 1px solid #f5f5f5;
        }
        .view-all-link:hover {
            background: #f8f9ff;
            text-decoration: none;
            color: #667eea;
        }
        .section-title {
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 0;
        }
        .section-subtitle {
            color: #7f8c8d;
            font-size: 0.85rem;
            margin-bottom: 0;
        }
    </style>
</head>

<body>

<!-- Profile Style Chat List Component -->
<div th:fragment="chatList">
    <div th:if="${#lists.isEmpty(recentChats)}" class="empty-profiles">
        <i class="fas fa-comments"></i>
        <p>No conversations yet</p>
        <small style="font-size: 0.8rem;">Start chatting from the directory</small>
    </div>
    
    <div th:if="${!#lists.isEmpty(recentChats)}" class="chat-profile-grid">
        <a th:each="chat : ${recentChats}" 
           th:href="@{/chat/{id}(id=${chat.user.id})}" 
           class="chat-profile-item">
            <div class="profile-avatar" th:text="${chat.user.name.charAt(0)}">
                <span th:if="${chat.unreadCount > 0}" class="message-indicator" th:text="${chat.unreadCount > 9 ? '9+' : chat.unreadCount}">1</span>
            </div>
            <div class="profile-name" th:text="${chat.user.name}">User Name</div>
            <div class="profile-status" th:if="${chat.unreadCount > 0}">
                <i class="fas fa-circle me-1" style="font-size: 0.4rem; color: #28a745;"></i>
                <span th:text="${chat.unreadCount + ' new'}">1 new</span>
            </div>
            <div class="profile-status" th:if="${chat.unreadCount == 0}">
                <i class="fas fa-check me-1" style="font-size: 0.4rem; color: #95a5a6;"></i>
                Active
            </div>
        </a>
    </div>
    
    <a href="/messages/inbox" class="view-all-link">
        <i class="fas fa-arrow-right me-2"></i>View All Messages
    </a>
</div>

</body>
</html>
