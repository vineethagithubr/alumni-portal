<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All Chats - Alumni Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .main-container {
            max-width: 1200px;
            margin: 80px auto;
            padding: 0 20px;
        }
        .page-header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .page-title {
            color: #2c3e50;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .page-subtitle {
            color: #7f8c8d;
            font-size: 1.1rem;
        }
        .chats-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        .chat-profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 30px;
        }
        .chat-profile-item {
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            padding: 20px 15px;
            border-radius: 20px;
        }
        .chat-profile-item:hover {
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f4ff 100%);
            transform: translateY(-5px);
            text-decoration: none;
            color: inherit;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.15);
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            margin: 0 auto 15px;
            font-size: 1.8rem;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.3);
            position: relative;
        }
        .profile-name {
            font-weight: 600;
            color: #2c3e50;
            font-size: 1rem;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .profile-status {
            color: #7f8c8d;
            font-size: 0.85rem;
        }
        .message-indicator {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #28a745;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            box-shadow: 0 3px 10px rgba(40, 167, 69, 0.4);
        }
        .empty-chats {
            text-align: center;
            padding: 80px 20px;
            color: #95a5a6;
        }
        .empty-chats i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.4;
        }
        .empty-chats h4 {
            color: #7f8c8d;
            margin-bottom: 10px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            color: white;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .back-link:hover {
            color: white;
            transform: translateX(-5px);
        }
    </style>
</head>

<body>

<div class="main-container">
    <a href="/dashboard" class="back-link">
        <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
    </a>

    <div class="page-header">
        <h1 class="page-title">
            <i class="fas fa-comments me-3"></i>All Chats
        </h1>
        <p class="page-subtitle">Click on any profile to start chatting</p>
    </div>

    <div class="chats-container">
        <div th:if="${#lists.isEmpty(recentChats)}" class="empty-chats">
            <i class="fas fa-comments"></i>
            <h4>No conversations yet</h4>
            <p>Start chatting with alumni from the directory</p>
            <a href="/directory" class="btn btn-primary">
                <i class="fas fa-users me-2"></i>Go to Directory
            </a>
        </div>
        
        <div th:if="${!#lists.isEmpty(recentChats)}" class="chat-profile-grid">
            <a th:each="chat : ${recentChats}" 
               th:href="@{/chat/{id}(id=${chat.user.id})}" 
               class="chat-profile-item">
                <div class="profile-avatar" th:text="${chat.user.name.charAt(0)}">
                    <span th:if="${chat.unreadCount > 0}" class="message-indicator" th:text="${chat.unreadCount > 9 ? '9+' : chat.unreadCount}">1</span>
                </div>
                <div class="profile-name" th:text="${chat.user.name}">User Name</div>
                <div class="profile-status" th:if="${chat.unreadCount > 0}">
                    <i class="fas fa-circle me-1" style="font-size: 0.4rem; color: #28a745;"></i>
                    <span th:text="${chat.unreadCount + ' new'}">1 new</span>
                </div>
                <div class="profile-status" th:if="${chat.unreadCount == 0}">
                    <i class="fas fa-check me-1" style="font-size: 0.4rem; color: #95a5a6;"></i>
                    Active
                </div>
            </a>
        </div>
    </div>
</div>

</body>
</html>
