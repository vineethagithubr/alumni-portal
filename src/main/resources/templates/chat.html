<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Chat - Alumni Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .chat-container {
            max-width: 800px;
            margin: 80px auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            height: 600px;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .chat-user-info {
            display: flex;
            align-items: center;
        }
        .chat-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 1.2rem;
        }
        .chat-name {
            font-weight: 600;
            font-size: 1.1rem;
        }
        .chat-status {
            font-size: 0.85rem;
            opacity: 0.9;
        }
        .back-button {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            transition: background 0.3s ease;
        }
        .back-button:hover {
            background: rgba(255,255,255,0.3);
            color: white;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            background: #f8f9fa;
        }
        .message-bubble {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-end;
        }
        .message-bubble.sent {
            justify-content: flex-end;
        }
        .message-bubble.received {
            justify-content: flex-start;
        }
        .bubble-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            max-width: 70%;
        }
        .bubble-wrapper.sent {
            flex-direction: row-reverse;
        }
        .bubble {
            flex: 1;
            padding: 12px 18px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        .bubble.sent {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }
        .bubble.received {
            background: white;
            color: #333;
            border: 1px solid #e9ecef;
            border-bottom-left-radius: 5px;
        }
        .message-time {
            font-size: 0.7rem;
            color: #999;
            margin-top: 5px;
        }
        .message-bubble.sent .message-time {
            text-align: right;
        }
        .message-actions {
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }
        .message-actions:hover {
            opacity: 1;
        }
        .message-actions .btn {
            padding: 4px 8px;
            font-size: 0.7rem;
        }
        .chat-input-container {
            padding: 20px 25px;
            background: white;
            border-top: 1px solid #e9ecef;
        }
        .chat-input-wrapper {
            display: flex;
            gap: 15px;
        }
        .chat-input {
            flex: 1;
            border: 1px solid #e9ecef;
            border-radius: 25px;
            padding: 12px 20px;
            resize: none;
            font-size: 0.95rem;
        }
        .chat-input:focus {
            outline: none;
            border-color: #667eea;
        }
        .chat-send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .chat-send-btn:hover {
            transform: scale(1.1);
        }
        .empty-chat {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-chat i {
            font-size: 3rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }
    </style>
</head>

<body>

<div class="chat-container">
    <div class="chat-header">
        <a href="/dashboard" class="back-button">
            <i class="fas fa-arrow-left me-2"></i>Back
        </a>
        <div class="chat-user-info">
            <div class="chat-avatar" th:text="${chatUser != null ? chatUser.name.charAt(0) : '?'}">U</div>
            <div>
                <div class="chat-name" th:text="${chatUser != null ? chatUser.name : 'User'}">User Name</div>
                <div class="chat-status" th:text="${chatUser != null ? chatUser.branch + ' • ' + chatUser.passoutYear : 'Loading...'}">Branch • Year</div>
            </div>
        </div>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div th:if="${chatUser == null}" class="empty-chat">
            <i class="fas fa-user-slash"></i>
            <h4>User Not Found</h4>
            <p>The user you're trying to chat with doesn't exist.</p>
            <a href="/directory" class="btn btn-primary">Back to Directory</a>
        </div>
        
        <div th:if="${chatUser != null and #lists.isEmpty(chatMessages)}" class="empty-chat">
            <i class="fas fa-comments"></i>
            <h4>Start a Conversation</h4>
            <p>No messages yet. Send the first message!</p>
        </div>
        
        <div th:if="${chatUser != null and !#lists.isEmpty(chatMessages)}">
            <div th:each="msg : ${chatMessages}" class="message-bubble" th:classappend="${msg.sender.id == currentUser.id ? 'sent' : 'received'}">
                <div class="bubble-wrapper">
                    <div class="bubble" th:text="${msg.content}">
                        Message content
                    </div>
                    <div class="message-actions" th:if="${isAdmin}">
                        <form th:action="@{/messages/private/delete/{id}(id=${msg.id})}" method="post" onsubmit="return confirm('Are you sure you want to delete this message? This action cannot be undone.')" style="display: inline;">
                            <button type="submit" class="btn btn-sm btn-outline-danger" title="Delete Message">
                                <i class="fas fa-trash"></i>
                            </button>
                        </form>
                    </div>
                </div>
                <div class="message-time" th:text="${#temporals.format(msg.sentDate, 'MMM dd, HH:mm')}">Time</div>
            </div>
        </div>
    </div>

    <div class="chat-input-container" th:if="${chatUser != null}">
        <form th:action="@{/messages/send}" method="post" id="chatForm">
            <input type="hidden" name="receiverId" th:value="${chatUser.id}">
            <div class="chat-input-wrapper">
                <textarea 
                    name="content" 
                    class="chat-input" 
                    placeholder="Type a message..." 
                    rows="1"
                    onkeypress="handleKeyPress(event)"></textarea>
                <button type="submit" class="chat-send-btn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </form>
    </div>
</div>

<script>
function handleKeyPress(event) {
    if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        submitMessage();
    }
}

// Submit message and refresh page
function submitMessage() {
    const form = document.getElementById('chatForm');
    const messageInput = document.querySelector('textarea[name="content"]');
    const messageContent = messageInput.value.trim();
    
    if (!messageContent) {
        return;
    }
    
    // Submit the form normally
    form.submit();
}

// Auto-scroll to bottom of messages
function scrollToBottom() {
    const messagesContainer = document.getElementById('chatMessages');
    if (messagesContainer) {
        setTimeout(() => {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }, 100);
    }
}

// Auto-refresh chat every 3 seconds
function startAutoRefresh() {
    setInterval(() => {
        // Check if user is not typing
        const messageInput = document.querySelector('textarea[name="content"]');
        if (!messageInput || messageInput !== document.activeElement) {
            // Refresh the page
            window.location.reload();
        }
    }, 3000);
}

// Initialize
document.addEventListener('DOMContentLoaded', function() {
    // Scroll to bottom
    scrollToBottom();
    
    // Focus on message input
    const messageInput = document.querySelector('textarea[name="content"]');
    if (messageInput) {
        messageInput.focus();
    }
    
    // Override form submission
    const form = document.getElementById('chatForm');
    if (form) {
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            submitMessage();
        });
    }
    
    // Start auto-refresh after 2 seconds
    setTimeout(startAutoRefresh, 2000);
});
</script>

</body>
</html>
