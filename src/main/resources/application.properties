spring.application.name=alumni-portal
spring.datasource.url=jdbc:postgresql://dpg-d6poevlm5p6s73fo366g-a.oregon-postgres.render.com:5432/alumni_db_iama?ssl=true&sslmode=require
spring.datasource.username=alumni_db_iama_user
spring.datasource.password=A8T7IhAufBFtvxffvQNADPVixGqzIE3y

# Database connection pool optimization
spring.datasource.hikari.maximum-pool-size=100
spring.datasource.hikari.minimum-idle=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=AlumniHikariPool
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# JPA/Hibernate optimization
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# Thymeleaf optimization
spring.thymeleaf.cache=true
spring.thymeleaf.mode=HTML
spring.thymeleaf.servlet.content-type=text/html
spring.thymeleaf.encoding=UTF-8

# Server optimization
server.port=${PORT:8080}
server.tomcat.max-threads=50
server.tomcat.min-spare-threads=50
server.tomcat.connection-timeout=20000
server.tomcat.max-connections=2048

# Session configuration for multiple users
server.servlet.session.timeout=30m
server.servlet.session.cookie.name=ALUMNI_SESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.tracking-modes=cookie

# Static resource optimization
spring.web.resources.static-locations=classpath:/static/,classpath:/public/,classpath:/resources/,classpath:/META-INF/resources/
spring.web.resources.cache.cachecontrol.max-age=3600
spring.web.resources.cache.cachecontrol.cache-public=true

# Performance monitoring
management.endpoints.web.exposure.include=health,info,metrics
management.metrics.export.simple.enabled=true

# JVM memory optimization for 100-200 concurrent users
java.runtime.version=17
java.runtime.java.home=/usr/lib/jvm/java-17-openjdk
java.runtime.vendor=Bellevue University
